<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELLA & LIAM | Creative Duo</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Montserrat:wght@700;900&family=Press+Start+2P&family=Work+Sans:wght@300;400;600;700&family=Antic+Didone&family=DotGothic16&family=Libre+Bodoni:ital,wght@1,400;1,700&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* ========== DESIGN SYSTEM ========== */
        :root {
            --blue: #4100F5;
            --citric: #CDF564;
            --aqua: #9BF0E1;
            --fushia: #F037A5;
            --tang: #FF4632;
            --black: #191414;
            --white: #ffffff;
            --gray: #a0a39d;
            --f-title: 'Montserrat', sans-serif;
            --f-pixel: 'Press Start 2P', cursive;
            --f-body: 'Work Sans', sans-serif;
            --f-serif: 'Antic Didone', serif;
            --f-dotgothic: 'DotGothic16', sans-serif;
            --f-bodoni: 'Libre Bodoni', serif;
        }

        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--f-body);
            font-weight: 300;
            color: var(--black);
            background: var(--white);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none;
            position: relative;
        }

        a, button, [role="button"] {
            cursor: none;
        }

        @media (max-width: 768px) {
            body { cursor: auto; }
            a, button, [role="button"] { cursor: pointer; }
        }

        /* Grain texture overlay — matching original */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 99998;
            pointer-events: none;
            opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            mix-blend-mode: multiply;
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--citric);
            border: 2px solid var(--black);
        }

        /* ========== TEXT SELECTION ========== */
        ::selection {
            background: var(--tang);
            color: var(--white);
        }

        /* ========== CUSTOM CURSOR ========== */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 99999;
            pointer-events: none;
            will-change: transform;
        }

        .cursor-ring {
            width: 28px;
            height: 28px;
            border: 1px solid var(--fushia);
            border-radius: 50%;
            position: absolute;
            top: -14px;
            left: -14px;
            transition: width .25s cubic-bezier(.22,1,.36,1), height .25s cubic-bezier(.22,1,.36,1), top .25s cubic-bezier(.22,1,.36,1), left .25s cubic-bezier(.22,1,.36,1), border-color .25s, opacity .25s;
        }

        .cursor-dot {
            width: 5px;
            height: 5px;
            background: var(--fushia);
            border-radius: 50%;
            position: absolute;
            top: -2.5px;
            left: -2.5px;
        }

        .custom-cursor.hovering .cursor-ring {
            width: 44px;
            height: 44px;
            top: -22px;
            left: -22px;
            border-color: var(--citric);
            opacity: .6;
        }

        .custom-cursor.hovering .cursor-dot {
            background: var(--citric);
        }

        @media (max-width: 768px) {
            .custom-cursor { display: none; }
        }

        /* ========== CONTAINER ========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }
        }

        /* ========== SECTIONS ========== */
        section {
            position: relative;
            z-index: 2;
        }

        /* ========== TYPOGRAPHY ========== */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--f-title);
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        p {
            line-height: 1.6;
            font-weight: 400;
        }

        /* ========== HERO SECTION ========== */
        .hero {
            background-color: var(--black);
            background-image:
                linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: calc(70vh - 60px - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            overflow: visible;
            padding: 30px 40px;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            margin-top: 60px;
        }

        .hero-title {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 15vw;
            white-space: nowrap;
            color: var(--tang);
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 0.88;
            animation: titleFadeIn 1s ease-out;
            pointer-events: none;
            position: relative;
            z-index: 1;
            width: 100%;
            text-align: center;
        }

        @keyframes titleFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tamagotchi-container {
            display: flex;
            gap: 0px;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
            margin-top: clamp(-100px, -12vw, -180px);
            position: relative;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .tamagotchi-container {
                gap: 10px;
                margin-top: calc(clamp(-100px, -12vw, -180px) + 50px);
            }
        }

        .tamagotchi {
            position: relative;
            width: clamp(240px, 38vw, 560px);
            aspect-ratio: 0.78;
            background: url('Tamagotchi Shell/Tamagotchi.png') center/contain no-repeat;
            border: none;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: -40px;
            margin-right: -40px;
            animation: tamaFloat 3.4s ease-in-out infinite;
        }

        .tamagotchi.liam-shell {
            background-image: url('Tamagotchi Shell/Tamagotchi.2png.png');
        }

        /* Ella button fine-tuning */
        .tamagotchi:not(.liam-shell) .tama-btn:nth-child(1) { transform: translate(-9px, 5px); }
        .tamagotchi:not(.liam-shell) .tama-btn:nth-child(2) { transform: translate(0, 11px); }
        .tamagotchi:not(.liam-shell) .tama-btn:nth-child(3) { transform: translate(12px, 5px); }

        .tamagotchi.liam-shell .tamagotchi-buttons {
            bottom: 30.5%;
            gap: 4%;
        }

        /* Liam button fine-tuning */
        .tamagotchi.liam-shell .tama-btn:nth-child(1) { transform: translate(-5px, -4px); }
        .tamagotchi.liam-shell .tama-btn:nth-child(3) { transform: translate(8px, -5px); }

        .tama-press-label {
            position: absolute;
            bottom: calc(28% + 8px);
            left: 0;
            right: 0;
            text-align: center;
            font-family: var(--f-pixel);
            font-size: clamp(2.56px, 0.384vw, 4.48px);
            color: rgba(25,20,20,0.4);
            letter-spacing: .08em;
            pointer-events: none;
            z-index: 20;
        }

        .tamagotchi:nth-child(2) {
            animation: tamaFloat 3.4s ease-in-out infinite;
        }

        @keyframes tamaFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes tamaFloatDelayed {
            0%, 100% {
                transform: translateY(-5px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .tamagotchi-frame {
            position: absolute;
            top: 28%;
            left: 28%;
            width: 44%;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            margin: 0;
            box-shadow: none;
        }

        .tamagotchi-screen {
            width: 100%;
            aspect-ratio: 0.965;
            border: none;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .tamagotchi-screen.liam {
            background: transparent;
        }

        .tamagotchi-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            font-family: var(--f-pixel);
            font-size: .4rem;
            position: relative;
            z-index: 2;
        }

        .hud-dots {
            display: flex;
            gap: 3px;
        }

        .hud-dot {
            width: 4px;
            height: 4px;
            background: var(--black);
        }

        .tamagotchi-avatar {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            padding-bottom: 0;
            overflow: visible;
        }

        .tamagotchi-avatar svg {
            display: block;
            max-width: 59.5%;
            max-height: 59.5%;
            width: auto;
            height: auto;
            transform: translateY(3px);
        }

        .tamagotchi-status {
            position: absolute;
            bottom: 4px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: var(--f-pixel);
            font-size: .35rem;
            color: var(--black);
            z-index: 3;
        }

        .tamagotchi-label {
            position: absolute;
            bottom: 8%;
            left: 0;
            right: 0;
            text-align: center;
            font-family: var(--f-pixel);
            font-size: 6px;
            color: rgba(0,0,0,.3);
            letter-spacing: .1em;
            z-index: 5;
        }

        /* Buttons are invisible — they overlay on the PNG's physical buttons */
        .tamagotchi-buttons {
            position: absolute;
            bottom: 32.5%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 3.5%;
            margin: 0;
            z-index: 20;
            pointer-events: auto;
        }

        .tama-button {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: transparent;
            border: none;
            box-shadow: none;
            cursor: pointer;
            transition: all .15s;
        }

        .tama-button:hover {
            background: rgba(255,255,255,.15);
            transform: scale(1.1);
        }

        .tama-button:active {
            transform: translate(1px, 1px);
        }

        /* ========== TAMA BUTTON TOOLTIPS ========== */
        .tama-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tama-btn-tip {
            position: absolute;
            bottom: 100%;
            margin-bottom: 6px;
            font-family: var(--f-pixel);
            font-size: .4rem;
            color: #191414;
            background: #fff;
            padding: 3px 7px;
            border: 2px solid #191414;
            letter-spacing: .06em;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity .2s, transform .2s;
            pointer-events: none;
        }

        .tama-btn:hover .tama-btn-tip {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes btnPulse {
            0% { box-shadow: 0 0 0 0 rgba(205,245,100,0.5); }
            70% { box-shadow: 0 0 0 10px rgba(205,245,100,0); }
            100% { box-shadow: 0 0 0 0 rgba(205,245,100,0); }
        }

        .tama-btn-dot {
            width: clamp(18px, 2.5vw, 36px);
            height: clamp(18px, 2.5vw, 36px);
            border-radius: 50%;
            background: transparent;
            border: none;
            box-shadow: none;
            cursor: pointer;
            transition: background .15s, transform .2s cubic-bezier(.34,1.56,.64,1);
            position: relative;
            z-index: 20;
        }

        .tama-btn-dot:hover {
            background: rgba(205,245,100,.25);
            transform: scale(1.25);
            animation: btnPulse .9s ease-out infinite;
        }

        .tama-btn-dot:active {
            transform: translate(1px, 1px);
        }

        /* ========== TAMA REACTION ANIMATIONS ========== */
        /* Generic excited */
        .tama-reacting { animation: tamaExcited .5s cubic-bezier(.34,1.56,.64,1) !important; }
        @keyframes tamaExcited {
            0%   { transform: scale(1); }
            25%  { transform: scale(1.06) rotate(-2deg); }
            50%  { transform: scale(1.08) rotate(2deg); }
            75%  { transform: scale(1.04) rotate(-1deg); }
            100% { transform: scale(1) rotate(0); }
        }

        /* Jump reaction for WORK (squash & stretch) */
        .tama-react-jump { animation: tamaJump .6s cubic-bezier(.34,1.56,.64,1) !important; }
        @keyframes tamaJump {
            0%   { transform: translateY(0) scale(1); }
            20%  { transform: translateY(4px) scale(1.05,.92); }
            45%  { transform: translateY(-30px) scale(.95,1.08); }
            65%  { transform: translateY(-28px) scale(1); }
            80%  { transform: translateY(2px) scale(1.03,.96); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Wave reaction for ABOUT */
        .tama-react-wave { animation: tamaWave .6s cubic-bezier(.22,1,.36,1) !important; }
        @keyframes tamaWave {
            0%   { transform: rotate(0); }
            20%  { transform: rotate(-6deg); }
            40%  { transform: rotate(6deg); }
            60%  { transform: rotate(-4deg); }
            80%  { transform: rotate(3deg); }
            100% { transform: rotate(0); }
        }

        /* Wink reaction for CONTACT */
        .tama-react-wink { animation: tamaWink .5s cubic-bezier(.34,1.56,.64,1) !important; }
        @keyframes tamaWink {
            0%   { transform: scale(1) rotate(0); }
            30%  { transform: scale(1.08) rotate(3deg); }
            60%  { transform: scale(1.05) rotate(-2deg); }
            100% { transform: scale(1) rotate(0); }
        }

        /* Hover reactions (gentle, looping while button hovered) */
        .tama-hover-work { animation: tamaHoverJump .6s cubic-bezier(.34,1.56,.64,1) infinite !important; }
        @keyframes tamaHoverJump {
            0%,100% { transform: translateY(0) scale(1); }
            30%  { transform: translateY(-12px) scale(.97,1.04); }
            60%  { transform: translateY(-10px) scale(1); }
            80%  { transform: translateY(2px) scale(1.02,.97); }
        }

        .tama-hover-about { animation: tamaHoverShy .8s cubic-bezier(.22,1,.36,1) infinite !important; }
        @keyframes tamaHoverShy {
            0%,100% { transform: rotate(0) scale(1); }
            25%  { transform: rotate(-3deg) scale(.97); }
            50%  { transform: rotate(2deg) scale(.98); }
            75%  { transform: rotate(-1deg) scale(.99); }
        }

        .tama-hover-contact { animation: tamaHoverWink .7s cubic-bezier(.34,1.56,.64,1) infinite !important; }
        @keyframes tamaHoverWink {
            0%,100% { transform: scale(1) rotate(0); }
            30%  { transform: scale(1.05) rotate(2deg); }
            60%  { transform: scale(1.03) rotate(-1deg); }
        }

        /* ========== BUMP ANIMATIONS (two tamagotchis) ========== */
        @keyframes tamaBumpRight {
            0%, 100% { transform: translateX(0) rotate(0); }
            30%  { transform: translateX(18px) rotate(2deg); }
            50%  { transform: translateX(12px) rotate(0deg); }
            70%  { transform: translateX(15px) rotate(1deg); }
        }

        @keyframes tamaBumpLeft {
            0%, 100% { transform: translateX(0) rotate(0); }
            30%  { transform: translateX(-18px) rotate(-2deg); }
            50%  { transform: translateX(-12px) rotate(0deg); }
            70%  { transform: translateX(-15px) rotate(-1deg); }
        }

        .tama-shell-bounce {
            animation: tamaExcited .5s cubic-bezier(.34,1.56,.64,1) forwards !important;
            z-index: 3;
        }

        .tama-bump-left {
            animation: tamaBumpLeft .5s ease-out forwards !important;
        }

        .tama-bump-right {
            animation: tamaBumpRight .5s ease-out forwards !important;
        }

        /* ========== PIXEL DITHER DIVIDER ========== */
        .sec-divider {
            position: relative;
            z-index: 5;
            pointer-events: none;
            line-height: 0;
            overflow: hidden;
            height: clamp(48px, 6vw, 80px);
            min-height: 48px;
        }
        .sec-divider.hero-divider {
            height: clamp(80px, 12vw, 160px);
            min-height: 80px;
            margin-top: 0;
            z-index: 3;
        }
        .sec-divider canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ========== WORK SECTION ========== */
        .work {
            background: var(--white);
            padding: 100px 40px 60px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .section-title {
            font-size: clamp(3.5rem, 8vw, 6rem);
            letter-spacing: -.03em;
            margin-bottom: 20px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .work-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-bottom: 80px;
        }

        @media (max-width: 1024px) {
            .work-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
            }
        }

        @media (max-width: 768px) {
            .work-grid {
                grid-template-columns: 1fr;
            }
        }

        .work-card {
            position: relative;
            cursor: pointer;
            animation: cardFadeIn 0.6s ease-out forwards;
            opacity: 0;
        }

        .work-card:nth-child(1) { animation-delay: 0s; }
        .work-card:nth-child(2) { animation-delay: 0.1s; }
        .work-card:nth-child(3) { animation-delay: 0.2s; }
        .work-card:nth-child(4) { animation-delay: 0.3s; }
        .work-card:nth-child(5) { animation-delay: 0.4s; }
        .work-card:nth-child(6) { animation-delay: 0.5s; }

        @keyframes cardFadeIn {
            to {
                opacity: 1;
            }
        }

        .work-card-image {
            position: relative;
            aspect-ratio: 16 / 10;
            border: 2px solid var(--black);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1rem;
            transition: transform .45s cubic-bezier(.34,1.56,.64,1), box-shadow .45s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gray);
        }

        .work-card:hover .work-card-image {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 12px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
        }

        .work-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .work-card-image-placeholder {
            font-family: var(--f-pixel);
            font-size: 24px;
            color: var(--white);
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--citric) 0%, var(--aqua) 100%);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .work-card-info {
            padding: 0 8px;
        }

        .work-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .work-card-meta-left {
            flex: 1;
        }

        .work-card-title {
            font-family: var(--f-title);
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -.02em;
            margin-bottom: 4px;
            transition: color .3s;
        }

        .work-card:hover .work-card-title {
            color: var(--blue);
        }

        .work-card-client {
            font-family: var(--f-body);
            font-weight: 600;
            font-size: .75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .work-card-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 99px;
            font-family: var(--f-body);
            font-size: .49rem;
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: -.01em;
            border: 1px solid rgba(0,0,0,.2);
        }

        .work-card-badge.activation {
            background: var(--tang);
            color: var(--white);
        }
        .work-card-badge.social {
            background: var(--fushia);
            color: var(--white);
        }
        .work-card-badge.film {
            background: var(--blue);
            color: var(--white);
        }
        .work-card-badge.ooh {
            background: var(--black);
            color: var(--citric);
        }
        .work-card-badge.print {
            background: var(--aqua);
            color: var(--black);
        }
        .work-card-badge.integrated {
            background: var(--citric);
            color: var(--black);
        }
        .work-card-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .work-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 2rem;
            flex-wrap: wrap;

        .work-filter-btn {

        .work-filter-btn.active {

        /* ========== MIXED TITLE ========== */
        .mixed-title {
            display: inline-block;

        }

        .mixed-char {

            transition: all 0.2s;
        }

        .mixed-char {

            position: relative;

        .mixed-char:hover {

        .f-serif {

        .f-italic {

        /* ========== ABOUT SECTIONS ========== */

            justify-content: center;

        .about-ella {
            background: var(--tang);
            color: var(--white);
        }

        .about-container {

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;

                grid-template-columns: 1fr;

        @keyframes aboutTamaFloat {

                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes aboutTamaFloatDelayed {
            0%, 100% {
                transform: translateY(-10px);
            }
            50% {
                transform: translateY(10px);
            }
        }

        .about-tamagotchi {
            width: 194px;
            max-width: 194px;
            aspect-ratio: 0.78;

            padding: 0;
            position: relative;

        .about-frame {

            left: 28%;

            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;

        .about-screen {
            width: 100%;

            display: flex;
            align-items: center;

            background: transparent;

        .about-avatar {

            height: 48%;

        .about-avatar svg {
            width: 100%;
            height: 100%;

        .about-buttons {
            position: absolute;

        }

        .about-button {

            height: 16px;
            background: transparent;

            transition: all .15s;
        }

        .about-button:hover {
            background: rgba(255,255,255,.15);

        }

        /* ========== JUNK JOURNAL ABOUT ========== */
        .journal-spread {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: center;
        }

        @media (max-width: 1024px) {
            .journal-spread {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .journal-collage {
                margin-top: 60px;

        .journal-collage {

        .journal-item {

        .journal-item:hover {

        .journal-item img {
            width: 100%;
            height: 100%;

            display: block;
        }

        .journal-photo img {

        .journal-bead {

        .journal-bead img {

        }

        .bead-string {

        }

        .journal-tama-mini {
            position: absolute;
        }

        .journal-tama-mini .about-tamagotchi {
            width: 130px;
            max-width: 130px;
        }

        /* Stella/Liam journal */
        .stella-journal-photo {
            width: 54%;
            top: 50%;
            left: 24%;
            transform: rotate(-2deg) translateY(-50%);
            z-index: 1;
        }

        .stella-tama-pos {

            width: 30%;
            bottom: calc(12% + 80px);
            right: 8%;
            transform: rotate(-8deg);
            z-index: 6;
        }

        .liam-football-boot {
            width: 48%;
            bottom: calc(18% - 20px);
            left: -2%;
            transform: rotate(6deg);
            z-index: 2;
        }

        .liam-onigiri {
            width: 20%;
            top: calc(10% + 28% - 50px);
            right: calc(5% + 10px);
            transform: rotate(10deg);
            z-index: 4;
        }

        .liam-bib {
            width: 34%;

            right: calc(5% + 30px);
            transform: rotate(36deg);

        }

        .liam-record-player {

        .liam-record {

        .liam-tama-pos {

            right: 5%;
            z-index: 5;

        /* Ella journal items */
        .ella-main-photo {
            width: 55%;
            top: 0;
            left: 22%;
            transform: rotate(2deg);
            z-index: 4;
        }

        /* Polaroid - hero item, large, center-top */
        .ella-polaroid {
            width: 60%;
            top: 0%;
            left: 25%;
            transform: rotate(-3deg);
            z-index: 5;
        }

        /* No white border - remove journal-photo class in JSX */

        /* Camera - top left corner */
        .ella-camera {
            width: 25%;
            top: 2%;
            left: -2%;
            transform: rotate(8deg);
            z-index: 3;
        }

        /* Vinyl group - positions both cover and record together */
        .ella-vinyl-group {
            position: absolute;
            width: 36.4%;
            bottom: calc(25% + 20px);
            left: calc(2% + 40px);
            transform: rotate(-6deg);
            z-index: 2;
        }

        /* Vinyl cover - on top */
        .ella-vinyl-cover {
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* Vinyl record - underneath cover, half sticking out */
        .ella-vinyl {
            width: 100%;
            position: absolute;
            top: 0%;
            left: calc(50% - 72px - 20px - 40px);
            transform: rotate(0deg);
            z-index: 1;
        }

        /* Skateboard - left side, vertical */
        .ella-skateboard {
            width: 17.3%;
            top: 18%;
            left: -1%;
            transform: rotate(-10deg);
            z-index: 4;
        }

        /* Tamagotchi - hero item, center-right */
        .ella-tama-pos {
            top: 0%;
            right: 2%;
            z-index: 6;
            transform: rotate(5deg);
        }

        .ella-tama-pos .about-tamagotchi {
            width: 244px;
            max-width: 244px;
        }

        /* Stroopwafel - hero item, center */
        .ella-stroopwafel {
            width: 22.5%;
            top: calc(28% + 12px);
            left: 42%;
            transform: rotate(15deg);
            z-index: 7;
        }

        /* MTG card - right of stroopwafel */
        .ella-mtg {
            width: 11%;
            top: 32%;
            right: 8%;
            transform: rotate(-12deg);
            z-index: 5;
        }

        /* Flight ticket - underneath vinyl group */
        .ella-ticket {
            width: 50.6%;
            bottom: calc(25% + 20px - 20px + 10px + 20px + 10px + 10px);
            left: calc(2% + 40px + 30px + 40px + 50px + 8px + 8px);
            transform: rotate(3deg);
            z-index: 1;
        }

        /* Snow lift ticket - bottom right */
        .ella-snowlift {
            width: 12%;
            bottom: 68%;
            right: 0%;
            transform: rotate(-6deg);
            z-index: 3;
        }

        /* Bead letters row 1: ART DIREC - across center */
        .ella-beads {
            top: 38%;
            left: 5%;
            transform: rotate(-2deg);
            z-index: 8;
        }

        /* Bead letters row 2: TOR */
        .ella-beads-row2 {
            top: 44%;
            left: 10%;
            transform: rotate(3deg);
            z-index: 8;
        }

        /* Hover lift on journal items */
        .journal-item:hover {
            transform: scale(1.02) !important;
        }

        @media (max-width: 768px) {
            .about { padding: 30px 24px; }
            .journal-collage {
                min-height: 300px;
                aspect-ratio: 1;
                margin-top: 40px;
            }
            .journal-bead { width: 24px; height: 24px; }
            .journal-tama-mini .about-tamagotchi { width: 100px; max-width: 100px; }
        }

        /* ========== CONTACT SECTION ========== */
        .contact {
            background: var(--black);
            color: var(--white);
            padding: 60px 40px 180px;
            min-height: auto;
        }

        .contact-title {
            font-family: var(--f-title);
            font-size: clamp(3.5rem, 8vw, 6rem);
            font-weight: 700;
            text-align: center;
            letter-spacing: .02em;
            margin-bottom: 3rem;
            text-shadow: 3px 3px 0 var(--blue), -1px -1px 0 var(--tang);
        }

        .contact-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3rem 4rem;
            margin-top: 3rem;
        }

        .contact-icon-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--white);
            transition: transform .35s cubic-bezier(.34,1.56,.64,1), color .25s;
        }

        .contact-icon-link:hover {
            transform: translateY(-8px) scale(1.05);
            color: var(--citric);
        }

        .contact-icon-circle {
            width: 64px;
            height: 64px;
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .25s, background .25s;
        }

        .contact-icon-link:hover .contact-icon-circle {
            border-color: var(--citric);
            background: rgba(205,245,100,.08);
            box-shadow: 0 0 20px rgba(205,245,100,.15);
        }

        .contact-icon-label {
            font-family: var(--f-body);
            font-size: .85rem;
            font-weight: 500;
            letter-spacing: -.01em;
        }

        .contact-footer {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-bottom: 3rem;
        }

        @media (max-width: 768px) {
            .contact-footer {
                grid-template-columns: 1fr;
            }
        }

        .contact-column h3 {
            font-family: var(--f-pixel);
            font-size: 12px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--citric);
        }

        .contact-column ul {
            list-style: none;
        }

        .contact-column li {
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        /* ========== AWARDS TICKER ========== */
        .awards-ticker-wrap {
            width: 100%;
            margin: 0;
            position: relative;
            z-index: 5;
        }

        .ticker-dither {
            width: 100%;
            line-height: 0;
            font-size: 0;
        }


        .ticker-dither canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .awards-ticker {
            overflow: hidden;
            white-space: nowrap;
            width: 100%;
            padding: 0.7rem 0;
            margin: 0;
            background: var(--blue);
            display: flex;
            align-items: center;
        }

        .awards-ticker-track {
            display: inline-flex;
            align-items: center;
            will-change: transform;
            animation: ticker-scroll 50s linear infinite;
        }

        .awards-ticker-item {
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
            font-family: var(--f-pixel);
            font-size: clamp(0.65rem, 1.5vw, 0.9rem);
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--white);
        }

        .awards-ticker-dot {
            flex-shrink: 0;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            line-height: 1;
            padding: 0 1.5rem;
            filter: grayscale(0) brightness(1.1) saturate(1.5);
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .contact-credits {
            text-align: center;
            padding-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }

        .contact-credits-line {
            margin: 4px 0;
        }

        /* ========== MODAL ========== */
        .proj-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(25,20,20,.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .35s cubic-bezier(.22,1,.36,1);
        }
        .proj-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .proj-modal {
            background: var(--white);
            border: 1px solid rgba(0,0,0,.1);
            border-radius: 8px;
            box-shadow: 0 16px 48px rgba(0,0,0,.15);
            max-width: 1100px;
            width: 92vw;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(30px) scale(.96);
            transition: transform .4s cubic-bezier(.34,1.56,.64,1);
            padding: 0;
        }
        .proj-overlay.open .proj-modal {
            transform: none;
        }
        .proj-modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,.6);
            color: var(--white);
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 50%;
            font-family: var(--f-body);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .2s;
            backdrop-filter: blur(4px);
        }
        .proj-modal-close:hover {
            background: var(--tang);
            color: var(--white);
        }
        .proj-modal-body {
            padding: 2rem 2.5rem 2.5rem;
        }
        @media (max-width: 640px) {
            .proj-modal-body { padding: 1.5rem 1.2rem; }
        }
        .proj-modal-client {
            font-family: var(--f-body);
            font-weight: 600;
            font-size: .8rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: .5rem;
        }
        .proj-modal-title {
            font-family: var(--f-title);
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 1.5rem;
            letter-spacing: -.02em;
        }
        .proj-modal-section {
            margin-bottom: 1.5rem;
        }
        .proj-modal-label {
            font-family: var(--f-body);
            font-weight: 700;
            font-size: .75rem;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: .12em;
            margin-bottom: .6rem;
        }
        .proj-modal-text {
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.6;
            white-space: pre-line;
            letter-spacing: -.01em;
        }
        .proj-modal-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .proj-modal-gallery.single-col {
            grid-template-columns: 1fr;
        }
        .proj-modal-gallery.three-col {
            grid-template-columns: repeat(3, 1fr);
        }
        @media (max-width: 768px) {
            .proj-modal-gallery.three-col { grid-template-columns: 1fr; }
            .proj-modal-gallery { gap: .6rem; }
        }
        .proj-modal-gallery img {
            width: 100%;
            border: 1px solid rgba(0,0,0,.08);
            border-radius: 4px;
            transition: transform .3s cubic-bezier(.34,1.56,.64,1);
        }
        .proj-modal-gallery img:hover {
            transform: translateY(-3px);
        }
        .proj-modal-gallery .gallery-full {
            grid-column: 1 / -1;
        }
        .group-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .group-row img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid rgba(0,0,0,.08);
            border-radius: 4px;
            transition: transform .3s cubic-bezier(.34,1.56,.64,1);
        }
        .group-row img:hover {
            transform: translateY(-3px);
        }
        .group-row-full {
            grid-template-columns: 1fr;
        }
        .group-row-full img {
            object-fit: contain;
        }
        @media (max-width: 768px) {
            .group-row { grid-template-columns: repeat(2, 1fr); gap: .6rem; }
            .group-row-full { grid-template-columns: 1fr; }
        }
        .group-collage {
            position: relative;
            min-height: 800px;
            margin-bottom: 2rem;
            border-radius: 8px;
            padding: 2rem;
            overflow: visible;
        }
        .group-collage .collage-item {
            position: absolute;
            overflow: visible;
            cursor: pointer;
            transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease, z-index 0s;
        }
        .group-collage .collage-item::before {
            content: '';
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%) rotate(var(--tape-rot, 0deg));
            width: 32px;
            height: 14px;
            background: rgba(255,255,200,.5);
            border: 1px solid rgba(0,0,0,.08);
            z-index: 3;
            border-radius: 1px;
        }
        .group-collage .collage-item:nth-child(odd)::before { --tape-rot: 3deg; }
        .group-collage .collage-item:nth-child(3n)::before { --tape-rot: -5deg; left: 30%; }
        .group-collage .collage-item:nth-child(5n)::before { left: 65%; }
        .group-collage .collage-item:hover {
            z-index: 30 !important;
            transform: scale(1.12) rotate(0deg) !important;
            box-shadow: 8px 14px 28px rgba(0,0,0,.4);
        }
        .group-collage .collage-item img {
            width: 100%;
            height: auto;
            object-fit: contain;

        /* ========== CUSTOM CURSOR ========== */
        function CustomCursor() {
            const cursorRef = useRef(null);
            const [hovering, setHovering] = useState(false);

            useEffect(() => {
                const el = cursorRef.current;
                if (!el) return;
                let x = 0, y = 0, tx = 0, ty = 0;

                const move = (e) => { tx = e.clientX; ty = e.clientY; };
                const tick = () => {
                    x += (tx - x) * 0.4;
                    y += (ty - y) * 0.4;
                    el.style.transform = `translate(${x}px,${y}px)`;
                    requestAnimationFrame(tick);
                };

                const over = (e) => {
                    const t = e.target.closest('a,button,[role="button"],.work-card,.contact-method,.contact-icon');
                    setHovering(!!t);
                };

                window.addEventListener('mousemove', move);
                window.addEventListener('mouseover', over);
                requestAnimationFrame(tick);
                return () => {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseover', over);
                };
            }, []);

            return (
                <div ref={cursorRef} className={`custom-cursor ${hovering ? 'hovering' : ''}`}>
                    <div className="cursor-ring" />
                    <div className="cursor-dot" />
                </div>
            );
        }

        /* ========== MIXED TITLE ========== */
        function MixedTitle({ text, hoverable = true }) {
            const [hoverIndex, setHoverIndex] = useState(null);
            const fontClasses = ['f-serif', 'f-italic', 'f-pixel'];

            // Pseudo-random pattern based on char codes
            const getInitialFont = (index) => {
                return fontClasses[index % fontClasses.length];
            };

            const [fontStates, setFontStates] = useState(
                text.split('').map((_, i) => getInitialFont(i))
            );

            const handleCharHover = (index) => {
                if (!hoverable) return;

                const newStates = [...fontStates];
                // Cycle current char and neighbors
                [index - 1, index, index + 1].forEach((i) => {
                    if (i >= 0 && i < newStates.length) {
                        const currentIdx = fontClasses.indexOf(newStates[i]);
                        newStates[i] = fontClasses[(currentIdx + 1) % fontClasses.length];
                    }
                });
                setFontStates(newStates);
            };

            return (
                <div className="mixed-title">
                    {text.split('').map((char, i) => (
                        <span
                            key={i}
                            className={`mixed-char ${fontStates[i]}`}
                            onMouseEnter={() => handleCharHover(i)}
                            style={{ cursor: hoverable ? 'pointer' : 'default' }}
                        >
                            {char}
                        </span>
                    ))}
                </div>
            );
        }

        /* ========== INTERACTIVE TAMA ========== */
        function InteractiveTama({ label, isStella = false, avatar: Avatar }) {
            const [hoveredBtn, setHoveredBtn] = useState(null);
            const [blinking, setBlink] = useState(false);
            const [reacting, setReacting] = useState(false);
            const [reactionTarget, setReactionTarget] = useState(null);

            useEffect(() => {
                const iv = setInterval(() => {
                    setBlink(true);
                    setTimeout(() => setBlink(false), 150);
                }, 3500);
                return () => clearInterval(iv);
            }, []);

            const handleBtn = (target) => {
                setReacting(true);
                setReactionTarget(target);
                setTimeout(() => { setReacting(false); setReactionTarget(null); }, 600);

                // Route based on which tamagotchi (Ella vs Liam)
                if (target === 'contact') {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    return;
                }

                let scrollTarget = target;
                if (!isStella) {
                    // Ella's tamagotchi
                    if (target === 'work') {
                        const ellaCard = document.querySelector('.work-card:nth-child(4)');
                        if (ellaCard) { ellaCard.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
                    }
                    if (target === 'about') scrollTarget = 'about-ella';
                } else {
                    // Liam's tamagotchi
                    if (target === 'about') scrollTarget = 'about';
                }

                const el = document.getElementById(scrollTarget);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };

            const hoverEyes = hoveredBtn ? (REACTION_EYES[hoveredBtn] || 'happy') : null;
            const hoverMouths = hoveredBtn ? (REACTION_MOUTHS[hoveredBtn] || 'smile') : null;
            const eyeStyle = reacting ? (REACTION_EYES[reactionTarget] || 'sparkle') : (hoverEyes || 'normal');
            const mouthStyle = reacting ? (REACTION_MOUTHS[reactionTarget] || 'grin') : (hoverMouths || 'neutral');
            const showWink = (reacting && reactionTarget === 'contact') || hoveredBtn === 'contact';
            const animClass = reacting ? (REACTION_CLASSES[reactionTarget] || 'tama-reacting') : (hoveredBtn ? `tama-hover-${hoveredBtn}` : '');
            const statusText = reacting && reactionTarget && MOODS[reactionTarget]
                ? `→ ${MOODS[reactionTarget].status}!`
                : (hoveredBtn && MOODS[hoveredBtn] ? `→ ${MOODS[hoveredBtn].status}!` : '♡ CREATING...');

            return (
                <div className={`tamagotchi ${isStella ? 'liam-shell' : ''} ${animClass}`}>
                    <div className="tamagotchi-frame">
                        <div className={`tamagotchi-screen ${isStella ? 'stella' : ''}`}>
                            <div className="tamagotchi-avatar">
                                {isStella ? <Avatar mood={mouthStyle} blinking={blinking && !hoveredBtn} winking={showWink} shy={hoveredBtn==='about'}/> : <MemoEllaAvatar size={187} mood={mouthStyle} blinking={blinking && !hoveredBtn} winking={showWink} shy={hoveredBtn==='about'}/>}
                            </div>
                        </div>
                    </div>
                    <div className="tamagotchi-buttons">
                        {[{l:'WORK',t:'work'},{l:'ABOUT',t:'about'},{l:'CONTACT',t:'contact'}].map(b=>(
                            <div key={b.t} className="tama-btn" onMouseEnter={()=>setHoveredBtn(b.t)} onMouseLeave={()=>setHoveredBtn(null)}>
                                <span className="tama-btn-tip">{b.l}</span>
                                <button className="tama-btn-dot" onClick={()=>handleBtn(b.t)}/>
                            </div>
                        ))}
                    </div>
                    <div className="tama-press-label">PRESS ANY BUTTON</div>
                </div>
            );
        }

        /* ========== STORY VIEWER (UGC) ========== */
        function StoryViewer({ imgs, imgDir, name }) {
            const [current, setCurrent] = useState(0);
            const [progress, setProgress] = useState(0);
            const timerRef = useRef(null);
            const duration = 3000;
            const n = imgs.length;
            const mid = Math.floor(n / 2);

            useEffect(() => {
                let start = Date.now();
                const tick = () => {
                    const elapsed = Date.now() - start;
                    const pct = Math.min(elapsed / duration, 1);
                    setProgress(pct * 100);
                    if (pct >= 1) {
                        setCurrent(c => (c + 1) % n);
                        start = Date.now();
                        setProgress(0);
                    }
                    timerRef.current = requestAnimationFrame(tick);
                };
                timerRef.current = requestAnimationFrame(tick);
                return () => cancelAnimationFrame(timerRef.current);
            }, [current, n]);

            const frameSrc = encodeURI(`${imgDir}/story-frame.svg`);

            const getReorderedIndices = () => {
                const indices = [];
                for (let i = 0; i < n; i++) {
                    const idx = (current + i - mid + n) % n;
                    indices.push(idx);
                }
                return indices;
            };
            const ordered = getReorderedIndices();
            const leftImgs = ordered.slice(0, mid);
            const rightImgs = ordered.slice(mid + 1);

            return (
                <div className="story-strip">
                    <div className="story-strip-inner">
                        {leftImgs.map((idx, i) => {
                            const src = encodeURI(`${imgDir}/${imgs[idx]}`);
                            return (
                                <div key={'l'+i} className="story-card dimmed">

                                </div>
                            );
                        })}
                        <div className="story-frame-wrap">
                            <div className="story-frame-inner">
                                <div className="sf-images" style={{transform: `translateX(-${current * 100}%)`}}>
                                    {imgs.map((img, i) => {
                                        const src = encodeURI(`${imgDir}/${img}`);
                                        return <img key={i} src={src} alt={`${name} UGC ${i+1}`} loading="lazy" />;
                                    })}

        /* ========== PROJECT MODAL ========== */
        function ProjectModal({ project, onClose }) {
            const p = project;
            const collageRef = useRef(null);

            const modalStyle = p.modalBg ? {background: p.modalBg} : {};
            const isDark = !!p.modalBg && !p.modalLight;
            const textStyle = isDark ? {color:'#fff'} : {color:'var(--black)'};
            const labelStyle = isDark ? {color:'var(--citric)'} : {color:'var(--blue)'};

            useEffect(() => {
                const onKey = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [onClose]);

            useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => { document.body.style.overflow = ''; };
            }, []);

            useEffect(() => {
                if (!collageRef.current) return;
                const obs = new IntersectionObserver(([e]) => {
                    if (e.isIntersecting) collageRef.current.classList.add('anim-in');
                }, {threshold: 0.1});
                obs.observe(collageRef.current);
                return () => obs.disconnect();
            }, [project]);

            // Seeded random for collage positions
            const seededRand = (seed) => {
                let s = seed;
                return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; };
            };
            const collagePositions = useMemo(() => {
                const rand = seededRand(7919);
                const n = 16;
                const order = Array.from({length: n}, (_, i) => i);
                for (let i = n-1; i > 0; i--) { const j = Math.floor(rand()*i); [order[i],order[j]] = [order[j],order[i]]; }
                const positions = [];
                const cols = 4, rows = 4;
                const cellW = 88 / cols, cellH = 85 / rows;
                const sizeMap = [250,115,230,105,120,240,110,220,235,120,210,125,115,245,130,220];
                for (let i = 0; i < n; i++) {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    const baseX = col * cellW + cellW * 0.15;
                    const baseY = row * cellH + cellH * 0.1;
                    const jitterX = (rand() - 0.5) * cellW * 0.4;
                    const jitterY = (rand() - 0.5) * cellH * 0.35;
                    const x = Math.max(0, Math.min(78, baseX + jitterX));
                    const y = Math.max(0, Math.min(80, baseY + jitterY));
                    const rot = (rand() * 18 - 9).toFixed(1);
                    const w = sizeMap[i] + Math.floor((rand()-0.5)*30);
                    positions.push({
                        left: `${x}%`, top: `${y}%`, width: `${w}px`,
                        '--end-rot': `${rot}deg`,
                        animationDelay: `${order[i] * 0.12}s`,
                        zIndex: Math.floor(rand() * 20),
                    });
                }
                return positions;
            }, [project]);

            const renderGroups = () => {
                if (!p.groups || p.groups.length === 0) return null;
                return (
                    <div className="proj-modal-section">
                        <div className="proj-modal-label" style={labelStyle}>GALLERY</div>
                        {p.groups.map((group, gi) => {
                            if (group.type === 'collage') {
                                return (
                                    <div key={gi} ref={collageRef} className="group-collage">
                                        {group.imgs.map((img, i) => {
                                            const src = encodeURI(`${p.imgDir}/${img}`);
                                            const pos = collagePositions[i] || {};
                                            return (
                                                <div key={i} className="collage-item" style={pos}>
                                                    <img src={src} alt={`${p.title} collage ${i+1}`} loading="lazy" />
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            }
                            if (group.type === 'row') {
                                return (
                                    <div key={gi}>
                                        {group.title && <h3 style={{fontFamily:'var(--f-title)',fontSize:'clamp(1.2rem,2vw,1.6rem)',fontWeight:700,letterSpacing:'-.02em',margin:'2rem 0 1rem',opacity:.7,...textStyle}}>{group.title}</h3>}
                                        <div className={`group-row${group.fullWidth ? ' group-row-full' : ''}`}>
                                            {group.imgs.map((img, i) => {
                                                const src = encodeURI(`${p.imgDir}/${img}`);
                                                return <img key={i} src={src} alt={`${p.title} row ${gi} img ${i+1}`} loading="lazy" />;
                                            })}
                                        </div>
                                    </div>
                                );
                            }
                            return null;
                        })}
                    </div>
                );
            };

            const renderGallery = () => {
                if (p.groups && p.groups.length > 0) return renderGroups();
                if (!p.imgs || p.imgs.length === 0) return null;
                const galleryImgs = p.imgs;

                // heroGif mode: first image full-bleed, rest in 3-col
                if (p.heroGif) {
                    const heroImg = galleryImgs[0];
                    const collageImgs = galleryImgs.slice(1);
                    const heroSrc = encodeURI(`${p.imgDir}/${heroImg}`);
                    return (
                        <div className="proj-modal-section">
                            <div className="proj-modal-label" style={labelStyle}>GALLERY</div>
                            <div className="proj-modal-gallery single-col">
                                <img src={heroSrc} alt={`${p.title} hero`} style={{width:'100%'}} />
                            </div>
                            {collageImgs.length > 0 && (
                                <div className="proj-modal-gallery three-col" style={{marginTop:'1rem'}}>
                                    {collageImgs.map((img, i) => {

                const galleryCols = galleryImgs.length === 1 ? 'single-col'

                return (
                    <div className="proj-modal-section">
                        <div className="proj-modal-label" style={labelStyle}>GALLERY</div>
                        <div className={`proj-modal-gallery ${galleryCols}`}>

            const renderVideos = () => {

        /* ========== AWARDS TICKER ========== */
        function TickerDither({topColor, bottomColor, pxSize = 4, seed = 42, flip = false, height = 24, marginTop = 0, className = ''}) {
            const containerRef = React.useRef(null);
            const canvasRef = React.useRef(null);

            React.useEffect(() => {
                const container = containerRef.current;
                const canvas = canvasRef.current;
                if (!container || !canvas) return;

                const colCache = {};
                const parseCol = (c) => {
                    if (colCache[c]) return colCache[c];
                    const tmp = document.createElement('canvas');
                    tmp.width = tmp.height = 1;
                    const tx = tmp.getContext('2d');
                    tx.fillStyle = c;
                    tx.fillRect(0, 0, 1, 1);
                    colCache[c] = Array.from(tx.getImageData(0, 0, 1, 1).data);
                    return colCache[c];
                };

                const draw = () => {
                    const w = container.clientWidth;
                    const h = container.clientHeight;
                    if (w === 0 || h === 0) return;
                    const cols = Math.ceil(w / pxSize);
                    const rows = Math.ceil(h / pxSize);
                    canvas.width = cols;
                    canvas.height = rows;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) return;

                    let s = seed;
                    const rand = () => { s = (s * 16807 + 0) % 2147483647; return (s & 0x7fffffff) / 0x7fffffff; };
                    const bayer = [
                        [0/16, 8/16, 2/16, 10/16],
                        [12/16, 4/16, 14/16, 6/16],
                        [3/16, 11/16, 1/16, 9/16],
                        [15/16, 7/16, 13/16, 5/16]
                    ];

                    const topRGB = parseCol(topColor);
                    const botRGB = parseCol(bottomColor);
                    const imgData = ctx.createImageData(cols, rows);
                    const d = imgData.data;

                    for (let i = 0; i < d.length; i += 4) {
                        d[i] = botRGB[0]; d[i+1] = botRGB[1]; d[i+2] = botRGB[2]; d[i+3] = 255;
                    }

                    for (let cy = 0; cy < rows; cy++) {
                        const rawT = cy / (rows - 1 || 1);
                        const t = flip ? 1 - rawT : rawT;
                        const density = flip ? (1 - rawT) * (1 - rawT) : 1 - t * t;

                        for (let cx = 0; cx < cols; cx++) {
                            const threshold = bayer[cy % 4][cx % 4];
                            const val = density + rand() * 0.175;
                            const idx = (cy * cols + cx) * 4;

                            if (val > threshold + 0.08) {
                                d[idx] = topRGB[0]; d[idx+1] = topRGB[1]; d[idx+2] = topRGB[2]; d[idx+3] = 255;
                            }
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);
                };

                draw();
                const ro = new ResizeObserver(() => { draw(); });
                ro.observe(container);
                return () => ro.disconnect();
            }, [topColor, bottomColor, pxSize, seed, flip]);

            return (
                <div ref={containerRef} className={`ticker-dither ${className}`} style={{background: bottomColor, height: height + 'px', marginTop: marginTop + 'px'}}>
                    <canvas ref={canvasRef} style={{imageRendering: 'pixelated'}} />
                </div>
            );
        }

        /* ========== PIXEL DITHER DIVIDER ========== */
        function PixelDivider({topColor, bottomColor, accentColor, pxSize=4, seed=0, className='', blendTop=false}) {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);

            useEffect(() => {
                const container = containerRef.current;
                const canvas = canvasRef.current;
                if (!container || !canvas) return;

                const colCache = {};
                const parseCol = (c) => {
                    if (colCache[c]) return colCache[c];
                    const tmp = document.createElement('canvas');
                    tmp.width = tmp.height = 1;
                    const tx = tmp.getContext('2d');
                    tx.fillStyle = c;
                    tx.fillRect(0, 0, 1, 1);
                    colCache[c] = Array.from(tx.getImageData(0, 0, 1, 1).data);
                    return colCache[c];
                };

                const draw = () => {
                    const w = container.clientWidth;
                    const h = container.clientHeight;
                    if (w === 0 || h === 0) return;

                    const cols = Math.ceil(w / pxSize);
                    const rows = Math.ceil(h / pxSize);
                    canvas.width = cols;
                    canvas.height = rows;

                    const ctx = canvas.getContext('2d');
                    if (!ctx) return;

                    let s = seed || 42;
                    const rand = () => { s = (s * 16807 + 0) % 2147483647; return (s & 0x7fffffff) / 0x7fffffff; };

                    const bayer = [
                        [0/16, 8/16, 2/16, 10/16],
                        [12/16, 4/16, 14/16, 6/16],
                        [3/16, 11/16, 1/16, 9/16],
                        [15/16, 7/16, 13/16, 5/16]
                    ];

                    const imgData = ctx.createImageData(cols, rows);
                    const d = imgData.data;

                    if (blendTop) {
                        const botRGB = parseCol(bottomColor);
                        const accentRGB = accentColor ? parseCol(accentColor) : null;
                        const blendStart = 0.35;

                        for (let cy = 0; cy < rows; cy++) {
                            const t = cy / (rows - 1 || 1);
                            const remapped = t <= blendStart ? 0 : (t - blendStart) / (1 - blendStart);
                            const density = remapped * remapped * remapped;
                            if (density <= 0) continue;

                            for (let cx = 0; cx < cols; cx++) {
                                const threshold = bayer[cy % 4][cx % 4];
                                const val = density + rand() * 0.075;
                                const idx = (cy * cols + cx) * 4;

                                if (val > threshold) {
                                    d[idx] = botRGB[0]; d[idx+1] = botRGB[1]; d[idx+2] = botRGB[2]; d[idx+3] = 255;
                                } else if (accentRGB && val > threshold - 0.08 && rand() < 0.08) {
                                    d[idx] = accentRGB[0]; d[idx+1] = accentRGB[1]; d[idx+2] = accentRGB[2]; d[idx+3] = Math.round(255 * (0.3 + rand() * 0.35));
                                }
                            }
                        }
                    } else {
                        const topRGB = parseCol(topColor);
                        const botRGB = parseCol(bottomColor);
                        const accentRGB = accentColor ? parseCol(accentColor) : null;

                        for (let i = 0; i < d.length; i += 4) {
                            d[i] = botRGB[0]; d[i+1] = botRGB[1]; d[i+2] = botRGB[2]; d[i+3] = 255;
                        }

                        for (let cy = 0; cy < rows; cy++) {
                            const t = cy / (rows - 1 || 1);
                            const density = 1 - t * t;

                            for (let cx = 0; cx < cols; cx++) {
                                const threshold = bayer[cy % 4][cx % 4];
                                const val = density + rand() * 0.175;
                                const idx = (cy * cols + cx) * 4;

                                if (val > threshold + 0.08) {
                                    d[idx] = topRGB[0]; d[idx+1] = topRGB[1]; d[idx+2] = topRGB[2]; d[idx+3] = 255;
                                } else if (accentRGB && val > threshold - 0.05 && rand() < 0.12) {
                                    d[idx] = accentRGB[0]; d[idx+1] = accentRGB[1]; d[idx+2] = accentRGB[2]; d[idx+3] = Math.round(255 * (0.4 + rand() * 0.4));
                                }
                            }
                        }
                    }

                    ctx.putImageData(imgData, 0, 0);
                };

                let resizeTimer;
                const debouncedDraw = () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(draw, 100); };

                draw();
                const ro = new ResizeObserver(debouncedDraw);
                ro.observe(container);
                return () => { ro.disconnect(); clearTimeout(resizeTimer); };
            }, [topColor, bottomColor, accentColor, pxSize, seed, blendTop]);

            return (
                <div ref={containerRef} className={`sec-divider ${className}`} style={{background: blendTop ? 'transparent' : bottomColor}}>
                    <canvas ref={canvasRef} style={{imageRendering: 'pixelated'}} />
                </div>
            );
        }
